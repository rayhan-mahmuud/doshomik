name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: [3.10, 3.11, 3.12, 3.13]
        steps:
            - uses: actions/checkout@v4
            - name: Install uv
              uses: astral-sh/setup-uv@v3
              with:
                enable-cache: true
                
            - name: Set Python ${{ matrix.python-version }}
              run: uv python install ${{ matrix.python-version }}
            - name: Install deps
              run: uv sync --python ${{ matrix.python-version }} --all-extras --dev
            - name: Lint
              run: uv run ruff check
            - name: Type check
              run: uv run mypy
            - name: Test
              run: uv run pytest
