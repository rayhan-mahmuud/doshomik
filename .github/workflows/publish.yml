name: Publish
on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
          id-token: write   # required for trusted publishing
        steps:
        - uses: actions/checkout@v4
        - uses: astral-sh/setup-uv@v3
        - run: uv build
        - uses: pypa/gh-action-pypi-publish@release/v1